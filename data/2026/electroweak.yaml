edition: 2026
source: PDG Review of Particle Physics 2026 - "Electroweak Model and Constraints
  on New Physics" review (Section 10) and "Mass and Width of the W Boson" review
  (Section 54)
source_url: https://pdg.lbl.gov/2026/reviews/rpp2026-rev-standard-model.pdf
note: Extracted from the 2026 review PDFs (Standard Model review dated 15 Apr 2026,
  W mass review dated 1 Dec 2025) - the PDFs are copyrighted and not stored, see
  src/electroweak_review.md and src/w_mass_review.md. The 2026 pdgall SQLite DB
  and mass_width file are not yet published; the values below come from the review
  text only.
quantities:
  sin2_theta_W:
    value: 0.22342
    error_positive: 9.0e-05
    error_negative: 9.0e-05
    unit: ''
    scheme: on-shell
  sin2_theta_eff:
    value: 0.23154
    error_positive: 6.0e-05
    error_negative: 6.0e-05
    unit: ''
    scheme: effective leptonic
  W_mass_ew_fit:
    value: 80.359
    error_positive: 0.006
    error_negative: 0.006
    unit: GeV
    source_column: EW review fit table, 2nd value column (SM-constrained value)
  Z_mass_ew_fit:
    value: 91.1883
    error_positive: 0.002
    error_negative: 0.002
    unit: GeV
    source_column: EW review fit table, 2nd value column (SM-constrained value)
  W_mass:
    value: 80.3625
    error_positive: 0.0077
    error_negative: 0.0077
    unit: GeV
    source: pdgprod.lbl.gov/pdgprod/pdgLive Viewer (S043M) - "OUR EVALUATION,
      LHC-TeVatron MW Working Group". This is the new world average that
      includes ATLAS 2024 refined + CMS 2025 + everything else (CDF-II 2022
      remains excluded). The static rpp2026-rev-w-mass.pdf was frozen at the
      older value 80.3692 +- 0.0133; the pdgLive viewer carries the newer,
      finalised combination - half the uncertainty.
  Z_mass:
    value: 91.1879
    error_positive: 0.0020
    error_negative: 0.0020
    unit: GeV
    source: pdgprod.lbl.gov/pdgprod/pdgLive Viewer (S044M) - "OUR AVERAGE",
      LEP-1 combination plus CDF result. Essentially unchanged from the
      static review (91.1880 -> 91.1879).
